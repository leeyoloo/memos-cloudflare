name = "memos-cloudflare"
main = "src/index.ts"
compatibility_date = "2024-06-01"

compatibility_flags = ["nodejs_compat"]

[vars]
LOG_LEVEL = "info"
BASE_URL = "https://memos-frontend-chk.pages.dev"

# Secrets - set via wrangler secret put
# JWT_SECRET
# R2_ACCOUNT_ID  
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_BUCKET

[[r2_buckets]]
bucket_name = "memos-files"
binding = "R2"

[[d1_databases]]
binding = "DB"
database_name = "memos"
database_id = "61fa4be9-e714-4e49-8b3a-8499c7996522"  # 替换为您的实际数据库ID

[env.staging]
name = "memos-cloudflare-staging"

[env.production]
name = "memos-cloudflare-production" 